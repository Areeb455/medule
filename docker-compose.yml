version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount the server directory for hot-reloading code
      - ./server:/app
      # Do not override the installed dependencies within the container
      - /app/venv
    environment:
      # This pulls the GEMINI_API_KEY from your local environment or the .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    # Command explicitly starts uvicorn with reload enabled since we are mounting code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Mount the frontend directory for hot-reloading UI code
      - .:/app
      # Do not mount local node_modules over the container's node_modules
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with file watching on some OS via Docker
